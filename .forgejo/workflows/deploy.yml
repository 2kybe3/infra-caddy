name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-public:
    runs-on: self-hosted

    steps:
      - name: deploy-public
        run: |
          response=$(curl -fsS http://caddy-public.internal.kybe.xyz:9999/hooks/redeploy || true)
          echo "$response"

          if [ $? -ne 0 ]; then
            echo "Webhook failed"
            exit 1
          fi
    
  deploy-internal:
    runs-on: self-hosted

    steps:
      - name: deploy-internal
        run: |
          response=$(curl -fsS http://caddy-internal.internal.kybe.xyz:9999/hooks/redeploy || true)
          echo "$response"

          if [ $? -ne 0 ]; then
            echo "Webhook failed"
            exit 1
          fi
